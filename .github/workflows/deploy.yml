name: TechMarket Orders CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-test-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Run validation
      run: |
        echo "Validando aplicación..."
        npm audit --audit-level=high || true

    - name: Build Docker image
      run: docker build -t orders-service .

    - name: Deploy GREEN
      run: |
        chmod +x deploy.sh
        ./deploy.sh

    - name: Verify deployment
      run: curl http://localhost:3002/health #REVISAR

    - name: Rollback on failure
      if: failure()
      run: |
        chmod +x rollback.sh
        ./rollback.sh