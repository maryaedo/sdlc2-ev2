name: Orquestador Principal TechMarket
on:
  push:
    branches: [main, master] 
  workflow_dispatch: 

jobs:
  # 1. Llama a la plantilla de Construcción (Node.js)
  call-build:
    uses: ./.github/workflows/build-template.yml
    with:
      node-version: '20'
      
  # 2. Llama a la plantilla de Pruebas (Jest / npm audit)
  call-test:
    needs: call-build
    uses: ./.github/workflows/test-template.yml
    with:
      node-version: '20'
      app-color: 'Pipeline-Validacion'

  # 3. Llama a la plantilla de Despliegue en AWS EKS (Blue-Green)
  call-deploy:
    needs: call-test
    uses: ./.github/workflows/deploy-template.yml
    with:
      app-color: 'Produccion-TechMarket'
    secrets: inherit # Propaga los secretos de AWS a la plantilla